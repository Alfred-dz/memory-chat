services:
  - type: web
    name: memory-chat
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: memory-chat-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      - key: PORT
        value: "10000"

databases:
  - name: memory-chat-db
    databaseName: memory_chat
    plan: free
    region: singapore
