app = "memory-chat"
primary_region = "hkg"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"

[mounts]
  source = "memory_data"
  destination = "/app/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
