<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #07090b;
    --bg-surface: #0f1216;
    --bg-elevated: #161a20;
    --gold: #bfa25c;
    --gold-dim: rgba(191,162,92,0.4);
    --gold-soft: rgba(191,162,92,0.08);
    --text-primary: #cec7ba;
    --text-secondary: #8a8278;
    --text-dim: #534e48;
    --border: #1c2027;
    --error: #c09090;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 15%, rgba(191,162,92,0.04) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  /* ── Login ── */
  #loginView {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  #loginView.hidden { display: none; }
  .login-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 360px;
    box-shadow: 0 0 80px rgba(0,0,0,0.4);
  }
  .login-card h1 {
    font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold);
    text-align: center; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .login-card .subtitle {
    font-size: 0.72rem; color: var(--text-dim); text-align: center;
    letter-spacing: 0.06em; margin-bottom: 24px;
  }
  .login-card input {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text-primary);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 14px;
    transition: border-color 0.3s ease;
  }
  .login-card input:focus { border-color: rgba(191,162,92,0.4); }
  .login-card button {
    width: 100%; padding: 12px 0; border-radius: 10px;
    border: 1px solid rgba(191,162,92,0.3); background: rgba(191,162,92,0.08);
    color: var(--gold); cursor: pointer; font-size: 0.85rem; letter-spacing: 0.04em;
    transition: all 0.3s ease;
  }
  .login-card button:hover { background: rgba(191,162,92,0.16); }
  .login-error { color: var(--error); font-size: 0.75rem; text-align: center; margin-top: 10px; min-height: 18px; }

  /* ── Dashboard ── */
  #dashView { position: relative; z-index: 1; display: flex; height: 100vh; }
  #dashView.hidden { display: none; }
  .sidebar {
    width: 300px; flex-shrink: 0; background: var(--bg-surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 {
    font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold);
    letter-spacing: 0.08em;
  }
  .sidebar-header button {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 12px; cursor: pointer; font-size: 0.65rem;
    letter-spacing: 0.04em; transition: all 0.3s ease;
  }
  .sidebar-header button:hover { border-color: rgba(191,162,92,0.3); color: var(--gold); }
  .user-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .user-list::-webkit-scrollbar { width: 2px; }
  .user-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }
  .user-item.blocked { opacity: 0.6; }
  .user-item.blocked .name { text-decoration: line-through; }
  .blocked-tag { font-size: 0.6rem; color: #c09090; background: rgba(192,144,144,0.1); padding: 1px 6px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
  .user-actions { display: flex; gap: 6px; margin-top: 8px; }
  .action-btn {
    font-size: 0.6rem; padding: 2px 10px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: none; color: var(--text-dim);
    letter-spacing: 0.04em; transition: all 0.25s ease;
  }
  .action-btn:hover { border-color: rgba(191,162,92,0.3); color: var(--gold); }
  .delete-btn:hover { border-color: rgba(192,144,144,0.4); color: #c09090; }
  .user-item {
    padding: 14px 20px; cursor: pointer; border-left: 2px solid transparent;
    transition: all 0.25s ease;
  }
  .user-item:hover { background: rgba(191,162,92,0.03); }
  .user-item.active { background: rgba(191,162,92,0.05); border-left-color: var(--gold-dim); }
  .user-item .name { font-size: 0.85rem; color: var(--text-primary); margin-bottom: 3px; }
  .user-item .meta { font-size: 0.65rem; color: var(--text-dim); display: flex; gap: 12px; }
  .user-item .meta span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .dot.online { background: #7aaa6a; }
  .dot.profile { background: #bfa25c; }

  .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-header {
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    font-size: 0.85rem; color: var(--text-secondary); letter-spacing: 0.03em;
  }
  .panel-header .username { color: var(--gold); }
  .conversation { flex: 1; overflow-y: auto; padding: 16px 28px; }
  .conversation::-webkit-scrollbar { width: 2px; }
  .conversation::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }
  .conversation .placeholder {
    color: var(--text-dim); font-style: italic; text-align: center;
    padding: 80px 20px; font-size: 0.9rem; letter-spacing: 0.03em;
  }
  .conv-msg { margin-bottom: 16px; max-width: 80%; }
  .conv-msg.user { margin-left: auto; }
  .conv-msg .role-label {
    font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .conv-msg.user .role-label { text-align: right; }
  .conv-msg .content {
    padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.85rem;
  }
  .conv-msg.assistant .content { background: var(--bg-elevated); border: 1px solid var(--border); }
  .conv-msg.user .content { background: rgba(191,162,92,0.06); border: 1px solid rgba(191,162,92,0.1); }
  .conv-time { font-size: 0.6rem; color: var(--text-dim); margin-top: 3px; padding: 0 4px; }
  .conv-msg.user .conv-time { text-align: right; }
  .profile-box {
    background: rgba(191,162,92,0.04); border: 1px solid rgba(191,162,92,0.1);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }
  .profile-box .pf-title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .profile-box .pf-name { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); }
  .profile-box .pf-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.7; margin-top: 8px; }

  @media (max-width: 768px) {
    #dashView { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; }
    .main-panel { flex: 1; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN VIEW
     ═══════════════════════════════════════ -->
<div id="loginView">
  <div class="login-card">
    <h1>Memory</h1>
    <p class="subtitle">Admin Access</p>
    <input type="password" id="adminPassword" placeholder="Admin password" autocomplete="off">
    <button type="button" id="adminLoginBtn">Enter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     DASHBOARD VIEW
     ═══════════════════════════════════════ -->
<div id="dashView" class="hidden">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Users</h2>
      <button id="adminLogoutBtn">Logout</button>
    </div>
    <div class="user-list" id="userList"></div>
  </div>
  <div class="main-panel">
    <div class="panel-header" id="panelHeader">Select a user to view their dialogue</div>
    <div class="conversation" id="conversationView">
      <div class="placeholder">Select a user from the list to read their conversation</div>
    </div>
  </div>
</div>

<script>
const loginView = document.getElementById('loginView');
const dashView = document.getElementById('dashView');
const convView = document.getElementById('conversationView');
const panelHeader = document.getElementById('panelHeader');
const userList = document.getElementById('userList');
let selectedUserId = null;

// ── Check existing admin session ──
(async () => {
  try {
    const res = await fetch('/api/admin/check');
    const data = await res.json();
    if (data.authenticated) {
      loginView.classList.add('hidden');
      dashView.classList.remove('hidden');
      loadUsers();
    }
  } catch (err) {}
})();

// ── Admin login ──
document.getElementById('adminLoginBtn').addEventListener('click', async () => {
  const pw = document.getElementById('adminPassword').value;
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (!res.ok) { errorEl.textContent = data.error; return; }
    loginView.classList.add('hidden');
    dashView.classList.remove('hidden');
    loadUsers();
  } catch (err) { errorEl.textContent = 'Connection failed.'; }
});

document.getElementById('adminPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
});

// ── Logout ──
document.getElementById('adminLogoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST' });
  dashView.classList.add('hidden');
  loginView.classList.remove('hidden');
  document.getElementById('adminPassword').value = '';
});

// ── Load users ──
async function loadUsers() {
  try {
    const res = await fetch('/api/admin/users');
    const data = await res.json();
    userList.innerHTML = '';
    if (!data.users || data.users.length === 0) {
      userList.innerHTML = '<div style="padding:20px;color:var(--text-dim);text-align:center;font-size:0.8rem;">No users yet</div>';
      return;
    }
    data.users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item' + (u.blocked ? ' blocked' : '');
      div.innerHTML = `
        <div class="name">${esc(u.username)}${u.blocked ? ' <span class="blocked-tag">已拉黑</span>' : ''}</div>
        <div class="meta">
          <span>${u.message_count} 条对话</span>
          ${u.has_profile ? '<span><span class="dot profile"></span> 已画像</span>' : ''}
        </div>
        <div class="user-actions">
          <button class="action-btn block-btn" data-action="block">${u.blocked ? '取消拉黑' : '拉黑'}</button>
          <button class="action-btn delete-btn" data-action="delete">删除</button>
        </div>
      `;
      div.querySelector('.block-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleBlock(u.id, !u.blocked);
      });
      div.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteUserById(u.id, u.username);
      });
      div.addEventListener('click', () => {
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
        loadConversation(u.id, u.username);
      });
      userList.appendChild(div);
    });
  } catch (err) {}
}

// ── Block user ──
async function toggleBlock(userId, block) {
  try {
    const res = await fetch('/api/admin/users/' + userId + '/block', { method: 'POST' });
    if (res.ok) { loadUsers(); if (selectedUserId == userId) loadConversation(userId, ''); }
  } catch (err) {}
}

// ── Delete user ──
async function deleteUserById(userId, username) {
  if (!confirm('确定删除用户 "' + username + '" 吗？此操作不可恢复。')) return;
  try {
    const res = await fetch('/api/admin/users/' + userId, { method: 'DELETE' });
    if (res.ok) {
      convView.innerHTML = '<div class="placeholder">用户已删除</div>';
      panelHeader.textContent = 'Select a user to view their dialogue';
      loadUsers();
    }
  } catch (err) {}
}

// ── Load conversation ──
async function loadConversation(userId, username) {
  selectedUserId = userId;
  panelHeader.innerHTML = 'Conversation with <span class="username">' + esc(username) + '</span>';
  try {
    const res = await fetch('/api/admin/conversations/' + userId);
    const data = await res.json();

    let html = '';

    // Profile box
    if (data.profile) {
      html += '<div class="profile-box">';
      html += '<div class="pf-title">Personality Profile</div>';
      html += '<div class="pf-name">' + esc(data.profile.matchedFigure || '') + '</div>';
      html += '<div class="pf-text">' + data.profile.profileText + '</div>';
      if (data.profile.traits && data.profile.traits.length > 0) {
        html += '<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">';
        data.profile.traits.forEach(t => {
          html += '<span style="font-size:0.65rem;color:var(--gold);padding:2px 10px;border:1px solid rgba(191,162,92,0.2);border-radius:12px;">' + esc(t) + '</span>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    if (!data.messages || data.messages.length === 0) {
      html += '<div class="placeholder">No messages yet</div>';
    } else {
      data.messages.forEach(m => {
        const time = new Date(m.created_at + 'Z').toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        html += '<div class="conv-msg ' + m.role + '">';
        html += '<div class="role-label">' + (m.role === 'assistant' ? 'Psychologist' : username) + '</div>';
        html += '<div class="content">' + esc(m.content) + '</div>';
        html += '<div class="conv-time">' + time + '</div>';
        html += '</div>';
      });
    }

    convView.innerHTML = html;
  } catch (err) {
    convView.innerHTML = '<div class="placeholder">Failed to load conversation</div>';
  }
}

function esc(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
